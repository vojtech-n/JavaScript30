<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Console Tricks!</title>
  <link rel="icon" href="https://fav.farm/🔥" />
</head>
<body>

  <p onClick="makeGreen()">×BREAK×DOWN×</p>

  <script>
    const dogs = [{ name: 'Snickers', age: 2 }, { name: 'hugo', age: 8 }];

    function makeGreen() {
      const p = document.querySelector('p');
      p.style.color = '#BADA55';
      p.style.fontSize = '50px';
    }

    // Regular
    console.log("M")

    // Interpolated
    console.log("Hello I am a %s string!", "cojetycico");
    let str = "string";
    console.log(`Hello I am ${str}`);

    // Styled
    console.log("%c I am some great text", 'font-size: 50px');

    // warning!
    console.warn("OH NOOO");

    // Error :|
    console.error("Merda!");

    // Info
    console.info("Crocodiles eat 3-4 people per year");

    // Testing
    const p = document.querySelector('p');
    console.assert(p.classList.contains('ouch'), 'No!');
    console.assert(1 === 2, 'That is wrong!');

    // clearing
    // console.clear()

    // Viewing DOM Elements
    console.log(p);
    console.dir(p);

    // Grouping together
    dogs.forEach(dog => {
      console.groupCollapsed(`${dog.name}`);
      console.log(`This is ${dog.name}`);
      console.log(`${dog.name} is is ${dog.age} years old`);
      console.log(`${dog.name} is is ${dog.age * 7} dog years old`);
      console.groupEnd(`${dog.name}`);
    })

    // counting
    console.groupCollapsed('Wes');
    console.count('Wes');
    console.count('Wes');
    console.count('Wes');
    console.count('Wes');
    console.count('Wes');
    console.count('Wes');
    console.groupEnd('Wes');

    // timing
    console.time('fetching data');
    fetch('https://api.github.com/users/vojtech-n')
      .then(data => data.json())
      .then(data => {
        console.timeEnd('fetching data');
        console.log(data);
      });

    console.table(dogs);

  </script>
</body>
</html>
